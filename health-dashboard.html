<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { 'geist': ['"Geist Mono"', 'monospace'] },
            colors: {
              'dash-bg': '#0b0b0d',
              'surface': '#141416',
              'surface-hover': '#19191c',
              'border': 'rgba(255, 255, 255, 0.06)',
              'muted': '#505058',
              'muted-light': '#7e7e86',
              'text-primary': '#ededef',
              'text-secondary': '#a0a0a8',
            },
          },
        },
      }
    </script>

    <style>
      body { scrollbar-width: none; }
      body::-webkit-scrollbar { display: none; }

      .dash-card {
        background: #141416;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
      }

      .dep-row {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        gap: 16px;
        align-items: center;
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 12px;
      }
      .dep-row:hover { background: #19191c; }
      .dep-row:last-child { border-bottom: none; }

      .staleness-badge {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .staleness-major { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
      .staleness-minor { background: rgba(234, 179, 8, 0.2); color: #eab308; }
      .staleness-patch { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
      .staleness-current { background: rgba(34, 197, 94, 0.2); color: #22c55e; }

      #login-overlay {
        position: fixed; inset: 0; z-index: 100;
        background: #0b0b0d;
        display: flex; align-items: center; justify-content: center;
      }
      #login-overlay.hidden { display: none; }
      #login-box input {
        background: #0e0e10;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      #login-box input:focus { border-color: rgba(255, 255, 255, 0.12); outline: none; }

      .skeleton { background: rgba(255,255,255,0.04); border-radius: 4px; animation: skeleton-pulse 1.5s ease-in-out infinite; }
      @keyframes skeleton-pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

      .mobile-dep-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 16px;
      }
      @media (max-width: 640px) { .mobile-dep-grid { grid-template-columns: 1fr; } }

      .mobile-dep-card {
        background: #19191c;
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-left: 3px solid var(--severity-color, #505058);
        border-radius: 8px;
        padding: 12px 14px;
        transition: background 0.15s ease;
      }
      .mobile-dep-card:hover { background: #1e1e22; }

      .app-version-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 3px 0;
        font-size: 11px;
      }
      .app-version-row + .app-version-row {
        border-top: 1px solid rgba(255, 255, 255, 0.03);
      }

      .severity-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .donut-track { fill: none; stroke: rgba(255,255,255,0.06); }
      .donut-segment { fill: none; stroke-linecap: round; transition: stroke-dasharray 0.6s ease; }
    </style>
  </head>

  <body class="font-geist bg-dash-bg text-text-primary min-h-screen overflow-x-hidden">

    <div id="login-overlay">
      <div id="login-box" class="w-full max-w-[340px] px-6">
        <h1 class="text-2xl font-semibold tracking-tight mb-8 text-center">Health Dashboard</h1>
        <form id="login-form" class="flex flex-col gap-3">
          <input id="login-password" type="password" autocomplete="current-password"
            placeholder="Password"
            class="h-10 rounded-lg px-4 text-[13px] text-text-primary placeholder-muted focus:outline-none w-full">
          <button type="submit" id="login-btn"
            class="h-10 rounded-lg text-[13px] text-muted-light cursor-pointer w-full border border-[rgba(255,255,255,0.06)] hover:bg-surface-hover">
            Sign in
          </button>
          <p id="login-error" class="text-[11px] text-center text-[#F26F60] min-h-[18px]">&nbsp;</p>
        </form>
      </div>
    </div>

    <main class="min-h-screen flex flex-col px-6 sm:px-10 lg:px-16 py-16 mx-auto" style="max-width: 900px; display: none;">

      <header class="flex items-start justify-between mb-10">
        <h1 class="text-2xl sm:text-3xl font-semibold tracking-tight">Dependency Health</h1>
        <div class="flex items-center gap-3">
          <a href="dashboard-alternative.html" class="text-[11px] text-muted-light hover:text-text-secondary no-underline">
            ← Dashboard
          </a>
          <button id="logout-btn" title="Logout"
            class="h-8 w-8 rounded-lg flex items-center justify-center text-muted-light cursor-pointer border border-[rgba(255,255,255,0.06)] hover:bg-surface-hover">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M16 17l5-5m0 0l-5-5m5 5H9M9 3H7.8C6.12 3 5.28 3 4.64 3.33C4.07 3.61 3.61 4.07 3.33 4.64C3 5.28 3 6.12 3 7.8v8.4C3 17.88 3 18.72 3.33 19.36c0.28 0.57 0.74 1.03 1.31 1.31C4.96 19 5.8 19 7.48 19H9"/>
            </svg>
          </button>
        </div>
      </header>

      <div class="mb-6">
        <label class="text-[11px] text-muted uppercase tracking-wider block mb-2">Repository</label>
        <select id="repo-select"
          class="w-full max-w-md h-10 rounded-lg px-4 text-[13px] bg-surface border border-[rgba(255,255,255,0.06)] text-text-primary focus:outline-none focus:border-[rgba(255,255,255,0.12)]">
          <option value="">Loading projects…</option>
        </select>
      </div>

      <div class="dash-card overflow-hidden">
        <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.06)] flex items-center justify-between">
          <h2 class="text-sm font-medium text-text-primary">Dependencies</h2>
          <button id="refresh-btn" class="text-[11px] text-muted-light hover:text-text-secondary cursor-pointer">
            Refresh
          </button>
        </div>
        <div id="deps-content">
          <div class="p-8 text-center text-muted text-[13px]">
            Select a repository to check dependency freshness.
          </div>
        </div>
      </div>

      <section class="mt-12">
        <h2 class="text-lg sm:text-xl font-semibold tracking-tight mb-4">Mobile App Dependencies</h2>
        <p class="text-[12px] text-muted-light mb-6">Shared dependencies across GPS-S, Report, KomReg &amp; Fahrplan that need attention.</p>

        <div class="dash-card overflow-hidden">
          <div class="px-5 py-4 border-b border-[rgba(255,255,255,0.06)] flex items-center justify-between">
            <h3 class="text-sm font-medium text-text-primary">Shared Updates</h3>
            <button id="mobile-refresh-btn" class="text-[11px] text-muted-light hover:text-text-secondary cursor-pointer">
              Refresh
            </button>
          </div>
          <div id="mobile-deps-content">
            <div class="p-8 text-center text-muted text-[13px]">Loading shared dependencies…</div>
          </div>
        </div>
      </section>

    </main>

    <script>
      const WORKER_URL = 'https://linear-proxy.tobiaswenck.workers.dev';
      const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      const TOKEN_KEY = 'dash_token';
      function getToken() { return localStorage.getItem(TOKEN_KEY); }
      function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
      function clearToken() { localStorage.removeItem(TOKEN_KEY); }

      function decodePayload(token) {
        try {
          const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
          return JSON.parse(atob(base64));
        } catch { return null; }
      }
      function isTokenValid() {
        const token = getToken();
        if (!token) return false;
        const p = decodePayload(token);
        return p?.exp && p.exp > Math.floor(Date.now() / 1000);
      }

      function showApp() {
        document.getElementById('login-overlay').classList.add('hidden');
        document.querySelector('main').style.display = '';
      }
      function showLogin(msg) {
        document.getElementById('login-overlay').classList.remove('hidden');
        document.querySelector('main').style.display = 'none';
        if (msg) document.getElementById('login-error').textContent = msg;
      }

      async function workerFetch(path, body) {
        const token = getToken();
        const res = await fetch(`${WORKER_URL}${path}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify(body || {}),
        });
        if (res.status === 401) {
          clearToken();
          showLogin('Session expired. Please sign in again.');
          throw new Error('Unauthorized');
        }
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.error || `HTTP ${res.status}`);
        }
        return res;
      }

      // ── Semver & staleness ──
      function parseSemver(v) {
        if (!v || typeof v !== 'string') return { major: 0, minor: 0, patch: 0 };
        const clean = v.replace(/^[^\d]*/, '').split('-')[0];
        const [major, minor, patch] = clean.split('.').map((n) => parseInt(n, 10) || 0);
        return { major, minor, patch };
      }

      function staleness(current, latest) {
        if (!latest) return { level: 'unknown', severity: 'current', label: '?' };
        const c = parseSemver(current);
        const l = parseSemver(latest);
        if (c.major < l.major) return { level: 'major', severity: 'major', label: 'Major' };
        if (c.minor < l.minor) return { level: 'minor', severity: 'minor', label: 'Minor' };
        if (c.patch < l.patch) return { level: 'patch', severity: 'patch', label: 'Patch' };
        return { level: 'current', severity: 'current', label: 'Current' };
      }

      // ── Mobile app repos ──
      const MOBILE_REPOS = [
        { path: 'Rail-Network/gps-s/mobileapp', label: 'GPS-S' },
        { path: 'Rail-Network/report/mobileapp', label: 'Report' },
        { path: 'Rail-Network/komreg/komregapp', label: 'KomReg' },
        { path: 'Rail-Network/fahrplan-app', label: 'Fahrplan' },
      ];

      let cachedProjects = [];

      // ── Fetch projects ──
      async function loadProjects() {
        const res = await workerFetch('/gitlab/projects');
        cachedProjects = await res.json();
        const sel = document.getElementById('repo-select');
        sel.innerHTML = '<option value="">Select a project…</option>' +
          cachedProjects.map((p) => `<option value="${p.id}" data-branch="${p.defaultBranch || 'main'}">${p.path}</option>`).join('');
      }

      // ── Fetch package.json & check deps ──
      async function checkDependencies(projectId, ref) {
        const fileRes = await workerFetch('/gitlab/file', {
          projectId,
          filePath: 'package.json',
          ref: ref || 'main',
        });
        const text = await fileRes.text();
        let pkg;
        try {
          pkg = JSON.parse(text);
        } catch {
          throw new Error('Invalid package.json');
        }
        const allDeps = { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
        const names = Object.keys(allDeps);
        if (names.length === 0) return [];

        const verRes = await workerFetch('/npm-versions', { packages: names });
        const latestList = await verRes.json();

        const report = latestList.map(({ name, latest }) => {
          const current = allDeps[name];
          const s = staleness(current, latest);
          return { name, current, latest, ...s };
        });

        const order = { major: 0, minor: 1, patch: 2, current: 3 };
        report.sort((a, b) => (order[a.severity] ?? 4) - (order[b.severity] ?? 4));
        return report;
      }

      function renderDeps(report) {
        const container = document.getElementById('deps-content');
        if (!report || report.length === 0) {
          container.innerHTML = '<div class="p-8 text-center text-muted text-[13px]">No dependencies found.</div>';
          return;
        }

        const summary = {
          major: report.filter((r) => r.severity === 'major').length,
          minor: report.filter((r) => r.severity === 'minor').length,
          patch: report.filter((r) => r.severity === 'patch').length,
          current: report.filter((r) => r.severity === 'current').length,
        };

        container.innerHTML = `
          <div class="px-5 py-3 flex gap-4 text-[11px] border-b border-[rgba(255,255,255,0.04)]">
            ${summary.major ? `<span class="text-[#ef4444]">${summary.major} major</span>` : ''}
            ${summary.minor ? `<span class="text-[#eab308]">${summary.minor} minor</span>` : ''}
            ${summary.patch ? `<span class="text-[#3b82f6]">${summary.patch} patch</span>` : ''}
            <span class="text-[#22c55e]">${summary.current} current</span>
          </div>
          <div class="divide-y divide-[rgba(255,255,255,0.04)]">
            ${report.map((r) => `
              <div class="dep-row">
                <span class="text-text-primary font-mono truncate">${r.name}</span>
                <span class="text-muted font-mono text-[11px]">${r.current || '–'}</span>
                <span class="text-muted-light font-mono text-[11px]">${r.latest || '–'}</span>
                <span class="staleness-badge staleness-${r.severity}">${r.label}</span>
              </div>
            `).join('')}
          </div>
        `;
      }

      function renderLoading() {
        document.getElementById('deps-content').innerHTML = `
          <div class="p-8 space-y-3">
            ${[1,2,3,4,5].map(() => '<div class="h-4 skeleton w-full"></div>').join('')}
          </div>
        `;
      }

      function renderError(msg) {
        document.getElementById('deps-content').innerHTML = `
          <div class="p-8 text-center text-[#F26F60] text-[13px]">${msg}</div>
        `;
      }

      async function runCheck() {
        const sel = document.getElementById('repo-select');
        const projectId = sel.value;
        if (!projectId) {
          document.getElementById('deps-content').innerHTML =
            '<div class="p-8 text-center text-muted text-[13px]">Select a repository to check dependency freshness.</div>';
          return;
        }
        const ref = sel.selectedOptions[0]?.dataset?.branch || 'main';
        renderLoading();
        try {
          const report = await checkDependencies(projectId, ref);
          renderDeps(report);
        } catch (err) {
          renderError(err.message || 'Failed to fetch dependencies.');
        }
      }

      // ── Mobile app shared deps ──
      function matchMobileRepos() {
        return MOBILE_REPOS.map((repo) => {
          const match = cachedProjects.find(
            (p) => p.path === repo.path || p.pathWithNamespace === repo.path || p.path_with_namespace === repo.path
          );
          return match ? { ...repo, id: match.id, branch: match.defaultBranch || match.default_branch || 'main' } : null;
        }).filter(Boolean);
      }

      async function fetchRepoDeps(repo) {
        const fileRes = await workerFetch('/gitlab/file', {
          projectId: repo.id,
          filePath: 'package.json',
          ref: repo.branch,
        });
        const text = await fileRes.text();
        const pkg = JSON.parse(text);
        return { ...(pkg.dependencies || {}), ...(pkg.devDependencies || {}) };
      }

      async function loadMobileAppsSection() {
        const container = document.getElementById('mobile-deps-content');
        container.innerHTML = `<div class="p-8 space-y-3">${[1,2,3,4,5].map(() => '<div class="h-4 skeleton w-full"></div>').join('')}</div>`;

        const repos = matchMobileRepos();
        if (repos.length === 0) {
          container.innerHTML = '<div class="p-8 text-center text-muted text-[13px]">Could not find mobile app projects.</div>';
          return;
        }

        try {
          const results = await Promise.allSettled(repos.map((r) => fetchRepoDeps(r)));

          const repoResults = [];
          const warnings = [];
          results.forEach((res, i) => {
            if (res.status === 'fulfilled') {
              repoResults.push({ repo: repos[i], deps: res.value });
            } else {
              warnings.push(repos[i].label);
            }
          });

          if (repoResults.length < 2) {
            container.innerHTML = '<div class="p-8 text-center text-[#F26F60] text-[13px]">Not enough repos responded to compare.</div>';
            return;
          }

          const depSets = repoResults.map((r) => new Set(Object.keys(r.deps)));
          const sharedNames = [...depSets[0]].filter((name) => depSets.every((s) => s.has(name)));

          if (sharedNames.length === 0) {
            container.innerHTML = '<div class="p-8 text-center text-muted text-[13px]">No shared dependencies found.</div>';
            return;
          }

          const verRes = await workerFetch('/npm-versions', { packages: sharedNames });
          const latestList = await verRes.json();
          const latestMap = {};
          latestList.forEach(({ name, latest }) => { latestMap[name] = latest; });

          const SEVERITY_ORDER = { major: 0, minor: 1, patch: 2, current: 3 };

          const sharedDeps = sharedNames.map((name) => {
            const latest = latestMap[name];
            const perApp = repoResults.map((r) => {
              const current = r.deps[name];
              const s = staleness(current, latest);
              return { label: r.repo.label, current, severity: s.severity };
            });
            const worstSeverity = perApp.reduce(
              (w, a) => (SEVERITY_ORDER[a.severity] ?? 3) < (SEVERITY_ORDER[w] ?? 3) ? a.severity : w,
              'current'
            );
            return { name, latest, perApp, worstSeverity };
          });

          const outdated = sharedDeps
            .filter((d) => d.worstSeverity !== 'current')
            .sort((a, b) => (SEVERITY_ORDER[a.worstSeverity] ?? 4) - (SEVERITY_ORDER[b.worstSeverity] ?? 4) || a.name.localeCompare(b.name));

          renderMobileSection(outdated, sharedDeps.length, warnings, repoResults.length);
        } catch (err) {
          container.innerHTML = `<div class="p-8 text-center text-[#F26F60] text-[13px]">${err.message || 'Failed to load mobile deps.'}</div>`;
        }
      }

      function buildDonutSVG(counts, total) {
        if (total === 0) return '';
        const R = 34, C = 2 * Math.PI * R;
        const colors = { major: '#ef4444', minor: '#eab308', patch: '#3b82f6', current: '#22c55e' };
        const order = ['major', 'minor', 'patch', 'current'];
        let offset = 0;
        const segments = order
          .filter((k) => counts[k] > 0)
          .map((k) => {
            const frac = counts[k] / total;
            const dash = frac * C;
            const gap = C - dash;
            const seg = `<circle class="donut-segment" r="${R}" cx="42" cy="42" stroke="${colors[k]}" stroke-width="7" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" />`;
            offset += dash;
            return seg;
          }).join('');

        return `<svg viewBox="0 0 84 84" width="80" height="80">
          <circle class="donut-track" r="${R}" cx="42" cy="42" stroke-width="7" />
          ${segments}
          <text x="42" y="40" text-anchor="middle" fill="#ededef" font-size="16" font-family="Geist Mono, monospace" font-weight="600">${total - (counts.current || 0)}</text>
          <text x="42" y="52" text-anchor="middle" fill="#7e7e86" font-size="8" font-family="Geist Mono, monospace">updates</text>
        </svg>`;
      }

      function renderMobileSection(outdated, totalShared, warnings, repoCount) {
        const container = document.getElementById('mobile-deps-content');
        const COLORS = { major: '#ef4444', minor: '#eab308', patch: '#3b82f6', current: '#22c55e' };

        const counts = { major: 0, minor: 0, patch: 0, current: 0 };
        outdated.forEach((d) => { counts[d.worstSeverity] = (counts[d.worstSeverity] || 0) + 1; });
        counts.current = totalShared - outdated.length;

        const donut = buildDonutSVG(counts, totalShared);

        const statPills = [
          counts.major ? `<span class="text-[#ef4444]">${counts.major} major</span>` : '',
          counts.minor ? `<span class="text-[#eab308]">${counts.minor} minor</span>` : '',
          counts.patch ? `<span class="text-[#3b82f6]">${counts.patch} patch</span>` : '',
          `<span class="text-[#22c55e]">${counts.current} current</span>`,
        ].filter(Boolean).join('');

        const warningHTML = warnings.length
          ? `<div class="px-5 py-2 text-[11px] text-[#eab308] border-b border-[rgba(255,255,255,0.04)]">Could not load: ${warnings.join(', ')}</div>`
          : '';

        const cards = outdated.map((d) => {
          const color = COLORS[d.worstSeverity] || '#505058';
          const appRows = d.perApp.map((a) => `
            <div class="app-version-row">
              <span class="text-muted">${a.label}</span>
              <div class="flex items-center gap-2">
                <span class="text-text-secondary font-mono">${a.current || '–'}</span>
                <span class="severity-dot" style="background:${COLORS[a.severity]}"></span>
              </div>
            </div>
          `).join('');

          return `
            <div class="mobile-dep-card" style="--severity-color:${color}">
              <div class="flex items-start justify-between mb-2">
                <span class="text-[12px] text-text-primary font-semibold font-mono truncate">${d.name}</span>
                <span class="staleness-badge staleness-${d.worstSeverity} ml-2 flex-shrink-0">${d.worstSeverity[0].toUpperCase() + d.worstSeverity.slice(1)}</span>
              </div>
              <div class="text-[10px] text-muted mb-3">latest <span class="text-text-secondary">${d.latest || '?'}</span></div>
              <div>${appRows}</div>
            </div>
          `;
        }).join('');

        if (outdated.length === 0) {
          container.innerHTML = `
            ${warningHTML}
            <div class="flex items-center gap-6 px-5 py-5">
              ${donut}
              <div class="text-[12px]">
                <div class="text-text-primary font-medium mb-1">${totalShared} shared dependencies</div>
                <div class="text-[#22c55e]">All up to date across ${repoCount} apps</div>
              </div>
            </div>
          `;
          return;
        }

        container.innerHTML = `
          ${warningHTML}
          <div class="flex items-center gap-6 px-5 py-5 border-b border-[rgba(255,255,255,0.04)]">
            ${donut}
            <div>
              <div class="text-[12px] text-text-primary font-medium mb-2">${totalShared} shared across ${repoCount} apps</div>
              <div class="flex flex-wrap gap-3 text-[11px]">${statPills}</div>
            </div>
          </div>
          <div class="mobile-dep-grid">${cards}</div>
        `;
      }

      // ── Init ──
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');
        const btn = document.getElementById('login-btn');
        if (!pw) { errEl.textContent = 'Enter a password'; return; }
        btn.textContent = '...';
        btn.disabled = true;
        errEl.innerHTML = '&nbsp;';
        try {
          const res = await fetch(`${WORKER_URL}/auth`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw }),
          });
          const json = await res.json().catch(() => null);
          if (!res.ok) {
            errEl.textContent = json?.error || 'Authentication failed';
            return;
          }
          setToken(json.token);
          showApp();
          await loadProjects();
          loadMobileAppsSection();
        } catch {
          errEl.textContent = 'Could not reach server';
        } finally {
          btn.textContent = 'Sign in';
          btn.disabled = false;
        }
      });

      document.getElementById('logout-btn').addEventListener('click', () => {
        if (!IS_LOCAL) { clearToken(); showLogin(); }
      });

      document.getElementById('repo-select').addEventListener('change', runCheck);
      document.getElementById('refresh-btn').addEventListener('click', runCheck);
      document.getElementById('mobile-refresh-btn').addEventListener('click', loadMobileAppsSection);

      document.addEventListener('DOMContentLoaded', async () => {
        if (IS_LOCAL) {
          console.info('%c[DEV]%c Auth bypassed locally', 'color:#eab308;font-weight:bold', 'color:inherit');
          showApp();
          try {
            await loadProjects();
            loadMobileAppsSection();
          } catch (e) {
            document.getElementById('repo-select').innerHTML = '<option value="">API unavailable (deploy worker)</option>';
          }
          return;
        }
        if (isTokenValid()) {
          showApp();
          await loadProjects();
          loadMobileAppsSection();
        } else {
          clearToken();
          showLogin();
        }
      });
    </script>
  </body>
</html>
